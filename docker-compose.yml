version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - brewlang

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: brewlang
      MYSQL_USER: brewlang
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "brewlang", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - brewlang

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - brewlang

volumes:
  mysql_data:
  vendor_cache:

networks:
  brewlang:
    driver: bridge
